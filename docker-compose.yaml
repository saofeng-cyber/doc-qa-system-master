services:
  web:
    build: 
      context: .
      dockerfile: ./Dockerfile-web
    container_name: doc-qa-system-web
    ports:
      - 8080:80
  app:
    build:
      context: .
      dockerfile: ./Dockerfile-backend
    working_dir: /app
    container_name: doc-qa-system-app
    ports:
      - 8000:8000
    volumes:
      - ./app:/app/app
    env_file:
      - ./app/.env
    command: 
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
