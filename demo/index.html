<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document QA System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #faf9f7;
        --text: #1a1a1a;
        --accent: #c44536;
        --muted: #767676;
        --border: #e5e5e5;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 48px 64px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }
      .badge {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 6px 14px;
        border-radius: 20px;
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 40px;
        text-align: center;
      }
      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(48px, 8vw, 96px);
        font-weight: 400;
        line-height: 1.1;
        letter-spacing: -2px;
        margin-bottom: 24px;
        opacity: 0;
        animation: fadeUp 0.8s ease forwards;
      }
      h1 span {
        color: var(--accent);
      }
      .subtitle {
        font-size: 18px;
        color: var(--muted);
        max-width: 480px;
        line-height: 1.6;
        margin-bottom: 48px;
        opacity: 0;
        animation: fadeUp 0.8s ease 0.15s forwards;
      }
      .cta-group {
        display: flex;
        gap: 16px;
        opacity: 0;
        animation: fadeUp 0.8s ease 0.3s forwards;
      }
      .btn {
        padding: 14px 32px;
        font-size: 14px;
        font-weight: 500;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.25s ease;
        text-decoration: none;
      }
      .btn-primary {
        background: var(--text);
        color: var(--bg);
        border: 1px solid var(--text);
      }
      .btn-primary:hover {
        background: var(--accent);
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .btn-secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover {
        border-color: var(--text);
      }
      .grid-bg {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 60px 60px;
        opacity: 0.4;
        pointer-events: none;
        z-index: -1;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      footer {
        padding: 24px 64px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="grid-bg"></div>
    <header>
      <div class="logo">DocQA</div>
      <div class="badge">API Available</div>
    </header>
    <main>
      <h1>Ask Anything<br />From Your <span>Documents</span></h1>
      <p class="subtitle">
        Upload your documents and get instant answers powered by advanced
        language models.
      </p>
      <div class="cta-group">
        <a href="#" class="btn btn-primary">Get Started</a>
        <a href="#" class="btn btn-secondary">View Docs</a>
      </div>
    </main>
    <footer>
      <span>Version 1.0</span>
      <span>Powered by DeepSeek</span>
    </footer>
  </body>
</html>
